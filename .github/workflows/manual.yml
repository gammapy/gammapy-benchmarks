name: validation
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Title for pull request'
        required: true
        default: 'Update results from validations'
      urlrepo:
        description: 'Git file url to install Gammapy'
        required: true
        default: 'https://github.com/gammapy/gammapy.git'
      branch:
        description: 'Branch name to install Gammapy'
        required: true
        default: 'main'
jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: set env vars for GAMMAPY_DATA
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ "$BRANCH" = "main" ]; then
            DATASET_VERSION="dev"
          else
            # Only tags for major.minor versions (v2.1, v2.0, v1.3, etc.) are available
            VERSION="${BRANCH#v}"
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
            DATASET_VERSION="v${MAJOR_MINOR}"
          fi
          echo "GAMMAPY_DATA=/home/runner/work/gammapy-benchmarks/gammapy-benchmarks/gammapy-datasets/${DATASET_VERSION}" >> $GITHUB_ENV
      
      - name: Get gammapy-data cache key
        id: gammapy-data-version
        run: |
          if [ "${{ github.event.inputs.branch }}" = "main" ]; then
            COMMIT_SHA=$(curl -s https://api.github.com/repos/gammapy/gammapy-data/commits/main | jq -r '.sha[0:7]')
            echo "cache_key=gammapy-datasets-${COMMIT_SHA}" >> $GITHUB_OUTPUT
            echo "Latest gammapy-data commit: $COMMIT_SHA"
          else
            echo "cache_key=gammapy-datasets-${{ env.DATASET_VERSION }}" >> $GITHUB_OUTPUT
            echo "Using dataset version: ${{ env.DATASET_VERSION }}"
          fi

      - name: Cache gammapy-datasets
        id: cache-gammapy-datasets
        uses: actions/cache@v5
        with:
          path: gammapy-datasets
          key: ${{ steps.gammapy-data-version.outputs.cache_key }}
          restore-keys: |
            gammapy-datasets-

      - name: Cache LST-1 Crab data
        id: cache-lst1
        uses: actions/cache@v5
        with:
          path: ${{ env.GAMMAPY_DATA }}/lst1_crab_data
          key: lst1-crab-data-11445184-1
          restore-keys: |
            lst1-crab-data-

      - name: get env file
        run: curl -O https://raw.githubusercontent.com/gammapy/gammapy/main/environment-dev.yml
      - name: create and activate env
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: gammapy-dev
          environment-file: environment-dev.yml
          auto-update-conda: true

      - name: install gammapy
        run: |
          pip install git+${{ github.event.inputs.urlrepo }}@${{ github.event.inputs.branch }}
          pip install psrecord
          conda info
          conda list
          gammapy info

      - name: download datasets
        # Including LST-1 Crab data from Zenodo
        run: |
          # Download gammapy-datasets only if not cached
          if [ "${{ steps.cache-gammapy-datasets.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss - downloading gammapy-datasets"
            gammapy download datasets
          else
            echo "Using cached gammapy-datasets"
          fi

          # Download LST-1 data only if not cached
          if [ "${{ steps.cache-lst1.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss - downloading LST-1 Crab data from Zenodo"
            mkdir -p $GAMMAPY_DATA/lst1_crab_data
            echo "TEMP: skip LST-1 data download."
            python utils/download_from_zenodo.py 11445184 $GAMMAPY_DATA/lst1_crab_data
            echo "LST-1 data download successful"
          else
            echo "Using cached LST-1 Crab data"
          fi

      - name: run validation
        run: |
          cd validation
          python make.py run-validation all
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          title: ${{ github.event.inputs.title }}
